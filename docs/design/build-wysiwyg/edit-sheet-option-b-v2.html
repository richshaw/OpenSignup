<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Option B v2 — slots without the grid</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #fafbfc; }
    body { font-family: var(--font-sans); color: var(--ink); }
    button:focus-visible, a:focus-visible, input:focus-visible, [role="button"]:focus-visible {
      outline: 2px solid var(--brand); outline-offset: 2px;
    }
    input::placeholder, textarea::placeholder { color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="grid-body.jsx"></script>
  <script type="text/babel" src="option-a.jsx"></script>
  <script type="text/babel" src="option-b-stacked.jsx"></script>
  <script type="text/babel" src="option-b-grouped.jsx"></script>
  <script type="text/babel" src="option-b-wysiwyg.jsx"></script>

  <script type="text/babel">
    const {
      DesignCanvas, DCSection, DCArtboard,
      BuildTabFrame, Annotation,
      OptionBStacked, OptionBGrouped, OptionBWysiwyg,
    } = window;

    // Seed for the "no date field" case — a potluck-style sign-up.
    // Fields: Dish (text), Servings (number), Course (list). No dates anywhere.
    const POTLUCK_FIELDS = [
      { id: 'p1', name: 'Dish', type: 'text' },
      { id: 'p2', name: 'Servings', type: 'number' },
      { id: 'p3', name: 'Course', type: 'enum', options: ['Appetizer', 'Main', 'Side', 'Dessert', 'Drink'] },
    ];
    const POTLUCK_ROWS = [
      { id: 'pr1', values: { p1: 'Caesar salad', p2: '8', p3: 'Side' }, capacity: 1 },
      { id: 'pr2', values: { p1: 'Pasta primavera', p2: '12', p3: 'Main' }, capacity: 1 },
      { id: 'pr3', values: { p1: 'Cornbread', p2: '6', p3: 'Side' }, capacity: 1 },
      { id: 'pr4', values: { p1: 'Brownies', p2: '24', p3: 'Dessert' }, capacity: 1 },
      { id: 'pr5', values: { p1: 'Lemonade', p2: '20', p3: 'Drink' }, capacity: 1 },
    ];

    function Artboard({ tag, title, blurb, children, label = 'draft' }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: 'white' }}>
          <Annotation tag={tag} title={title} blurb={blurb} />
          <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
            <BuildTabFrame label={label}>
              {children}
            </BuildTabFrame>
          </div>
        </div>
      );
    }

    const W = 1280;
    const H = 860;

    function App() {
      return (
        <DesignCanvas
          title="Option B v2 — slots without the grid"
          subtitle={<>Reimagining B: keep the schema rail, drop the spreadsheet for slots. <a href="Edit Sheet Option B.html" style={{ color: 'var(--brand)' }}>← compare to B as-is</a></>}
        >
          <DCSection id="b-stacked" title="B/1 — Stacked slot cards" defaultCollapsed={false}>
            <DCArtboard id="opt-b-stacked" label="B/1 · Stacked cards (form-like)" width={W} height={H}>
              <Artboard
                tag="B/1"
                title="Each slot is a card with stacked field rows"
                blurb={`The pattern already shipping on mobile, lifted to desktop. Schema rail at top is the same compact-chip strip from B. Below it, a single-column stack of slot cards that mirrors the signup form layout (per Richard's note — what the organiser builds visually matches what volunteers will see). Each card has a labelled "SLOT N" header (grip + duplicate + delete on hover), one labelled row per field (label·icon on the left, input on the right), and a capacity stepper as the last row.`}
              >
                <OptionBStacked />
              </Artboard>
            </DCArtboard>
          </DCSection>

          <DCSection id="b-grouped" title="B/2 — Grouped schedule" defaultCollapsed={false}>
            <DCArtboard id="opt-b-grouped" label="B/2 · Grouped by date" width={W} height={H}>
              <Artboard
                tag="B/2"
                title="Slots grouped under the primary date field"
                blurb={`Same schema rail. Below it, slots collapse into compact one-line rows clustered under date headers ("Thursday, May 21 · 3 slots"). The "Group by" picker in the slots header lets organisers pick any date/list/text field, or turn grouping off. Each row is grip · inline field chips · capacity stepper · actions — no table chrome, no cell grid. Scales to 50+ slots without losing the day/shift mental model that volunteer signups live in.`}
              >
                <OptionBGrouped />
              </Artboard>
            </DCArtboard>

            <DCArtboard id="opt-b-grouped-nodate" label="B/2 · No date field (e.g. potluck)" width={W} height={H}>
              <Artboard
                tag="B/2"
                title="When there is no date — falls back to a flat list"
                blurb={`Same sign-up authoring surface, but with a potluck-style schema: "Dish" (text) and "Servings" (number). No date or list field to group by, so the slots area auto-resolves to a flat list — same row vocabulary, no group headers. Organisers can still pick "Group by → Dish" from the header to cluster manually, or leave it as "Don't group". This is the answer to Richard's "what if a signup doesn't have dates?".`}
              >
                <OptionBGrouped initialFields={POTLUCK_FIELDS} initialRows={POTLUCK_ROWS} />
              </Artboard>
            </DCArtboard>
          </DCSection>

          <DCSection id="b-wysiwyg" title="B/3 — WYSIWYG editor" defaultCollapsed={false}>
            <DCArtboard id="opt-b-wysiwyg" label="B/3 · Edit the signup directly" width={W} height={H}>
              <Artboard
                tag="B/3"
                title="The editor is the signup page"
                blurb={`No schema rail, no slot list, no authoring chrome around the data. The build surface is the published signup, full-bleed and centred. Title, intro, date headers, and slot rows are all click-to-edit in place. Clicking a slot row expands it inline to edit every field (a row of inputs auto-laid from the schema). Schema management lives in a floating "N fields" dock at the bottom — invisible until you need it. Hover a slot for duplicate/delete; "Add a slot" sits inside each date group; "Add date" lives at the bottom of the sheet. Closest of any variant to "what you build is what you ship".`}
              >
                <OptionBWysiwyg />
              </Artboard>
            </DCArtboard>
          </DCSection>

          <DCSection id="why" title="Why drop the grid" defaultCollapsed={false}>
            <DCArtboard id="why-notes" label="Reasoning" width={1280} height={520}>
              <Reasoning />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    function Reasoning() {
      const points = [
        {
          axis: 'Grid was the wrong shape for the data',
          status: 'The slots table forced every signup into a spreadsheet idiom — even ones with 3 fields and 6 rows. The mobile UI already proves a card form reads better at typical sizes; we were re-importing tabular density to desktop without earning it.',
        },
        {
          axis: 'Cell-by-cell editing was inefficient',
          status: 'Tab-to-next-cell only matters when you have many rows of similar data. Most signups are 6–15 slots with a handful of fields per slot. Card form means the active slot fills the screen and you commit it before moving on — fewer half-empty rows during creation.',
        },
        {
          axis: 'Schema/data distinction stays clear',
          status: 'B/1 and B/2 both keep B\'s schema rail above. The promise of "columns up top, slot data below" survives — what changes is the shape of "below". Cards (B/1) and grouped lists (B/2) are both clearly not the schema rail.',
        },
        {
          axis: 'B/1 vs. B/2 — when to pick which',
          status: 'B/1 wins when slots are heterogeneous (each row has different values across many fields — a potluck sign-up, a sign-up sheet with notes). B/2 wins when slots are repetitive within a category (a shift schedule, a roster) — the date header carries information that would repeat in every B/1 card.',
        },
        {
          axis: 'Mobile/desktop parity',
          status: 'The user-shared mobile screenshot uses exactly the B/1 pattern (slot cards with stacked rows). Adopting it on desktop means one mental model across surfaces — and removes the only place the product asks organisers to operate a spreadsheet.',
        },
      ];

      return (
        <div style={{ padding: '24px 32px', height: '100%', boxSizing: 'border-box', background: 'white', overflow: 'auto' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 6 }}>
            <h2 style={{ margin: 0, fontSize: 20, fontWeight: 600, letterSpacing: '-0.02em' }}>
              Why drop the grid
            </h2>
            <span style={{ fontSize: 12, color: 'var(--ink-muted)' }}>
              Quick read on what we lose, what we gain, and which variant to commit to.
            </span>
          </div>
          <p style={{ margin: '0 0 18px', color: 'var(--ink-muted)', fontSize: 13, lineHeight: 1.5, maxWidth: 880 }}>
            The original B kept the schema rail novelty but inherited C/D/E's data grid for the slots underneath.
            That made the page two grids stacked: one for columns, one for rows. These variants pick a different
            shape for the second one.
          </p>
          <div style={{
            border: '1px solid var(--surface-sunk)', borderRadius: 'var(--radius-xl)', overflow: 'hidden',
          }}>
            <div style={{
              display: 'grid', gridTemplateColumns: '220px 1fr', gap: 0,
              background: 'var(--surface-raised)', padding: '10px 14px',
              fontSize: 11, fontWeight: 600, color: 'var(--ink-muted)',
              letterSpacing: '0.04em', textTransform: 'uppercase',
              borderBottom: '1px solid var(--surface-sunk)',
            }}>
              <span>Argument</span><span>Why it matters</span>
            </div>
            {points.map((d, i) => (
              <div key={i} style={{
                display: 'grid', gridTemplateColumns: '220px 1fr', gap: 0,
                padding: '14px', borderTop: i === 0 ? 'none' : '1px solid var(--surface-sunk)',
                fontSize: 13, alignItems: 'flex-start', lineHeight: 1.55,
              }}>
                <span style={{ fontWeight: 600, color: 'var(--ink)', paddingRight: 16 }}>{d.axis}</span>
                <span style={{ color: 'var(--ink-muted)', paddingRight: 16 }}>{d.status}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
