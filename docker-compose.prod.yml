# NEXT_PUBLIC_* values are inlined by Next.js at build time, so they must be
# passed as Docker build args (env_file only sets runtime container env, which
# is too late). Compose substitutes ${VAR} from the project `.env` file or the
# shell. The `:?` annotation makes Compose fail with a clear message instead
# of letting the inner `pnpm build` surface the Zod error.
x-instance-build: &instance-build
  build:
    context: .
    args:
      NEXT_PUBLIC_INSTANCE_NAME: ${NEXT_PUBLIC_INSTANCE_NAME:?NEXT_PUBLIC_INSTANCE_NAME required for build}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:?NEXT_PUBLIC_SUPPORT_EMAIL required for build}
      NEXT_PUBLIC_SOURCE_URL: ${NEXT_PUBLIC_SOURCE_URL:?NEXT_PUBLIC_SOURCE_URL required for build}
      NEXT_PUBLIC_GOVERNING_LAW: ${NEXT_PUBLIC_GOVERNING_LAW:?NEXT_PUBLIC_GOVERNING_LAW required for build}
      NEXT_PUBLIC_OPERATOR_NAME: ${NEXT_PUBLIC_OPERATOR_NAME:-}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-signup}
    volumes:
      - signup_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-signup} -d ${POSTGRES_DB:-signup}']
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    <<: *instance-build
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    command: ['pnpm', 'exec', 'tsx', 'src/db/migrate.ts']
    restart: 'no'

  web:
    <<: *instance-build
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - '${PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/public/health']
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    <<: *instance-build
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    command: ['pnpm', 'exec', 'tsx', 'src/jobs/worker.ts']
    restart: unless-stopped

volumes:
  signup_pg: {}
