name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signup
          POSTGRES_PASSWORD: signup
          POSTGRES_DB: signup
        ports: ['5433:5432']
        options: >-
          --health-cmd="pg_isready -U signup"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgres://signup:signup@localhost:5433/signup
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-ci
      AUTH_URL: http://localhost:3000
      EMAIL_TRANSPORT: console
      EMAIL_FROM: 'ci@signup.local'
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm db:migrate
      - run: pnpm test
      - run: pnpm test:db
      - run: pnpm build
